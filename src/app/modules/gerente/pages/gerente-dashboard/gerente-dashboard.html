<main>
  <p-fieldset legend="Acessos ao Mês" [toggleable]="false">
    <p-chart type="line" [data]="grafico" height="400px"></p-chart>
  </p-fieldset>
  <hr />
  <p-fieldset legend="Movimentações do Mês" [toggleable]="false">
    <p-table
      [value]="movimentacoes"
      [paginator]="true"
      [rows]="12"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="Exibindo {first} de {last} de {totalRecords} registros"
      [rowsPerPageOptions]="[12, 24, 36]"
      [stripedRows]="true"
      [showGridlines]="true"
    >
      <ng-template pTemplate="header">
        <tr>
          <th>Produto</th>
          <th>Quantidade</th>
          <th>Estoquista</th>
          <th>Tipo</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-produto>
        <tr>
          <td>{{ produto.produto }}</td>
          <td>{{ produto.quantidade }}</td>
          <td>{{ produto.estoquista }}</td>
          <td>
            <app-bag-tipo-movimentacao
              [tipoMovimentacao]="produto.tipo"
            ></app-bag-tipo-movimentacao>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="4">
            <span class="sem-resultados">Nenhuma movimentação encontrada!</span>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </p-fieldset>
  <hr />
  <p-fieldset legend="Consultas do Dia" [toggleable]="false">
    <p-table
      [value]="consultas"
      [paginator]="true"
      [rows]="12"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="Exibindo {first} de {last} de {totalRecords} registros"
      [rowsPerPageOptions]="[12, 24, 36]"
      [stripedRows]="true"
      [showGridlines]="true"
    >
      <ng-template pTemplate="header">
        <tr>
          <th>Descrição</th>
          <th>Tipo</th>
          <th>Data Hora</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-product>
        <tr>
          <td>{{ product.descricao }}</td>
          <td>
            {{ product.tipoMovimentacao }}
          </td>
          <td>{{ product.dataSolicitacao }}</td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="3">
            <span class="sem-resultados">Nenhuma consulta encontrada!</span>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </p-fieldset>
</main>
