@if (rota) {
  <header class="header-page">
    <div class="descricao-pagina">
      <h2>
        {{ rota.title }}
      </h2>
      <p>
        {{ rota.data?.descricao }}
      </p>
    </div>
    <div class="input-tema">
      <p-toggleswitch [(ngModel)]="checked" (onChange)="alterarTema()">
        <ng-template #handle let-checked="checked">
          <i
            [ngClass]="[
              '!text-xs',
              'fa-solid ',
              checked ? 'fa-sun' : 'fa-moon',
            ]"
          ></i>
        </ng-template>
      </p-toggleswitch>
      @if (rota.data?.voltar) {
        <p-button
          icon="pi pi-arrow-left"
          (click)="voltar()"
          label="Voltar"
          severity="danger"
        ></p-button>
      }
      <p-overlaybadge
        [badgeDisabled]="foiAbertoNotificiacoes || notificacoes.length === 0"
        [value]="notificacoes.length"
      >
        <p-button
          icon="fa fa-bell"
          tooltipPosition="left"
          pTooltip="Notificações"
          severity="secondary"
          (click)="alterarPopover()"
        />
      </p-overlaybadge>
      <!-- <div class="usuario">
        <button
          pButton
          [outlined]="false"
          [rounded]="true"
          severity="secondary"
          tooltipPosition="left"
          pTooltip="Perfil"
          (click)="alterarPopoverPerfil()"
        >
          @if (imagem === null) {
            <i class="fa fa-user"></i>
          } @else {
            <img [src]="imagem" alt="" />
          }
        </button> 
      </div>
      -->
    </div>
  </header>
}
<p-popover #op (onHide)="fehcarPopover()">
  @if (notificacoes.length > 0) {
    <span>Suas Notificicações</span>
    <hr />
    <div class="lista-notificacoes">
      @for (notificacao of notificacoes; track notificacao.id) {
        <div class="notificacao">
          <p-checkbox
            [binary]="true"
            [ngModel]="notificacaoMarcadaComoLida(notificacao.id)"
            (onChange)="marcarComoLida($event, notificacao.id)"
          />
          <span>{{ notificacao.mensagem }}</span>
        </div>
      }
    </div>
    <p-button
      [label]="
        notificacoesParaMarcarComoLidas.length > 0
          ? 'Marcar como lidas'
          : 'Marcar todas como lidas'
      "
      (click)="
        marcarSelecionadasComoLidas(
          notificacoesParaMarcarComoLidas.length === 0 ? true : false
        )
      "
    ></p-button>
  } @else {
    <strong style="text-align: center">Sem notificacoes</strong>
  }
</p-popover>
